name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and PostgreSQL integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://fold_web_app:ci-only-app-password@127.0.0.1:5432/fold_web_test?schema=public
      MIGRATION_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fold_web_test?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fold_web_shadow?schema=public
      TEST_DATABASE_URL: postgresql://fold_web_app:ci-only-app-password@127.0.0.1:5432/fold_web_test?schema=public
      TEST_MIGRATION_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fold_web_test?schema=public
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fold_web_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fold_web_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare isolated PostgreSQL roles and shadow database
        env:
          PGPASSWORD: postgres
        run: |
          psql --host 127.0.0.1 --username postgres --dbname fold_web_test \
            --set ON_ERROR_STOP=on \
            --command "CREATE ROLE fold_web_app LOGIN PASSWORD 'ci-only-app-password'"
          psql --host 127.0.0.1 --username postgres --dbname fold_web_test \
            --set ON_ERROR_STOP=on \
            --command "CREATE ROLE fold_web_readonly NOLOGIN"
          psql --host 127.0.0.1 --username postgres --dbname fold_web_test \
            --set ON_ERROR_STOP=on \
            --command "CREATE DATABASE fold_web_shadow"

      - name: Validate and generate Prisma Client
        run: |
          npm run db:validate
          npm run db:generate

      - name: Reject schema changes without a migration
        run: npm run db:migrate:check

      - name: Run unit tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript
        run: npm run typecheck

      - name: Run PostgreSQL integration tests
        run: npm run test:integration

      - name: Verify applied migration status
        run: npm run db:migrate:status

      - name: Build Next.js
        run: npm run build

      - name: Enforce high and critical production dependency gate
        run: npm audit --omit=dev --audit-level=high

      - name: Record complete dependency audit
        if: always()
        run: npm audit --json > npm-audit.json || true

      - name: Upload dependency audit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-${{ github.run_id }}
          path: npm-audit.json
          retention-days: 14

  docker:
    name: Build and publish linux/amd64 image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Validate Docker Compose
        run: docker compose config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: victoriatech/fold_web
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and publish production image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to app1.victoria-tech.com
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on:
      - self-hosted
      - linux
      - x64
      - production
    timeout-minutes: 15
    needs: docker
    environment: production
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install deployment files
        run: |
          install -m 755 -d /home/kyhoon/fold-web
          install -m 644 deploy/compose.yaml /home/kyhoon/fold-web/compose.yaml
          install -m 700 deploy/deploy.sh deploy/rollback.sh /home/kyhoon/fold-web/

      - name: Log in to Docker Hub on server
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          printf '%s' "$DOCKERHUB_TOKEN" | \
            docker login --username victoriatech --password-stdin

      - name: Deploy tagged image
        env:
          IMAGE: victoriatech/fold_web:${{ github.ref_name }}
        run: |
          /home/kyhoon/fold-web/deploy.sh "$IMAGE"
