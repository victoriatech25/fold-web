name: fold-web

services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:10000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s
